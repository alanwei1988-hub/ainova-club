<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AINova Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #050505; color: #fff; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .gradient-text {
      background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 50%, #00f5ff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="min-h-screen">
  <!-- Login Screen -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold mb-2 gradient-text">AINOVA ADMIN</h1>
        <p class="text-gray-400">管理员登录</p>
      </div>
      <div class="glass-card rounded-2xl p-8">
        <form id="loginForm" class="space-y-6">
          <div>
            <label class="block text-cyan-400 text-xs font-mono mb-2">邮箱</label>
            <input type="email" id="email" required 
              class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500 transition-all"
              placeholder="admin@ainova.club">
          </div>
          <div>
            <label class="block text-purple-400 text-xs font-mono mb-2">密码</label>
            <input type="password" id="password" required 
              class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500 transition-all"
              placeholder="••••••••">
          </div>
          <button type="submit" 
            class="w-full py-4 bg-gradient-to-r from-cyan-500 via-purple-500 to-pink-500 hover:from-cyan-400 hover:via-purple-400 hover:to-pink-400 text-white font-mono font-bold rounded-lg transition-all transform hover:scale-[1.02]">
            LOGIN_
          </button>
        </form>
        <p id="loginError" class="text-red-400 text-sm mt-4 hidden"></p>
      </div>
    </div>
  </div>

  <!-- Dashboard (hidden until logged in) -->
  <div id="dashboard" class="hidden">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-md border-b border-white/10">
      <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="text-xl font-bold gradient-text">AINOVA ADMIN</div>
        <div class="flex gap-4">
          <button onclick="showTab('events')" class="px-4 py-2 text-sm font-mono hover:text-cyan-400 transition-colors">📋 活动管理</button>
          <button onclick="showTab('registrations')" class="px-4 py-2 text-sm font-mono hover:text-purple-400 transition-colors">📊 报名数据</button>
          <button onclick="showTab('gallery')" class="px-4 py-2 text-sm font-mono hover:text-pink-400 transition-colors">📸 照片管理</button>
          <button onclick="logout()" class="px-4 py-2 text-sm font-mono text-red-400 hover:text-red-300 transition-colors">退出</button>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <div class="pt-20 pb-12 px-4">
      <div class="max-w-7xl mx-auto">
        
        <!-- Events Tab -->
        <div id="eventsTab" class="tab-content">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">📋 活动管理</h2>
            <button onclick="openEventModal()" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-lg font-mono font-bold hover:opacity-90 transition-opacity">
              + 新建活动
            </button>
          </div>
          <div id="eventsList" class="grid gap-6">
            <!-- Events will be loaded here -->
          </div>
        </div>

        <!-- Registrations Tab -->
        <div id="registrationsTab" class="tab-content hidden">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">📊 报名数据</h2>
            <select id="eventFilter" onchange="loadRegistrations()" class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white">
              <option value="">全部活动</option>
            </select>
          </div>
          <div class="glass-card rounded-xl overflow-hidden">
            <table class="w-full">
              <thead class="bg-white/5">
                <tr>
                  <th class="px-6 py-4 text-left text-xs font-mono text-gray-400">姓名</th>
                  <th class="px-6 py-4 text-left text-xs font-mono text-gray-400">电话</th>
                  <th class="px-6 py-4 text-left text-xs font-mono text-gray-400">学校</th>
                  <th class="px-6 py-4 text-left text-xs font-mono text-gray-400">专业</th>
                  <th class="px-6 py-4 text-left text-xs font-mono text-gray-400">年级</th>
                  <th class="px-6 py-4 text-left text-xs font-mono text-gray-400">活动</th>
                  <th class="px-6 py-4 text-left text-xs font-mono text-gray-400">时间</th>
                </tr>
              </thead>
              <tbody id="registrationsList" class="divide-y divide-white/10">
                <!-- Registrations will be loaded here -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Gallery Tab -->
        <div id="galleryTab" class="tab-content hidden">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">📸 照片管理</h2>
            <button onclick="openPhotoModal()" class="px-6 py-3 bg-gradient-to-r from-pink-500 to-purple-600 rounded-lg font-mono font-bold hover:opacity-90 transition-opacity">
              + 上传照片
            </button>
          </div>
          <div id="galleryList" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Photos will be loaded here -->
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../js/admin.js"></script>
</body>
</html>
